<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="260" viewBox="0 0 1080 260" role="img" aria-labelledby="title desc">
  <title id="title">Atlas Designs Logo</title>
  <desc id="desc">Compass-style mark with Atlas Designs wordmark and tagline.</desc>
  <defs>
