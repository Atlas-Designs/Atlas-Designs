      <stop offset="0%" stop-color="#0A5E67" />
      <stop offset="58%" stop-color="#157F84" />
      <stop offset="100%" stop-color="#C19B57" />
    </linearGradient>
    <linearGradient id="needleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B4857" />
      <stop offset="100%" stop-color="#C19B57" />
